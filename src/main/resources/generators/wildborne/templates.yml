templates:
  # Base Syllables
  wildborne_syllable_masc:
    hidden: true
    variants: ["%wildborne_onset_masc%%wildborne_nucleus_masc%%wildborne_coda_masc%"]

  wildborne_syllable_femme:
    hidden: true
    variants: ["%wildborne_onset_femme%%wildborne_nucleus_femme%%wildborne_coda_femme%"]

  # First Names
  wildborne_firstname_masc:
    hidden: true
    variants:
      - "%wildborne_syllable_masc%": 60
      - "%wildborne_syllable_masc%%wildborne_syllable_masc%": 40
    cleanup: "(.)\\1+|(sh|zh|z|s){2,}" # Collapse doubles and sibilant clusters

  # First Names: Femme
  wildborne_firstname_femme:
    hidden: true
    variants:
      - "%wildborne_syllable_femme%": 60
      - "%wildborne_syllable_femme%%wildborne_syllable_femme%": 40
    cleanup: "(.)\\1+|(sh|zh|z|s){2,}"

  wildborne_lastname_modern:
    hidden: true
    variants:
      - "%wildborne_adj%%wildborne_noun%"

  wildborne_lastname_traditional:
    hidden: true
    variants:
      - "%wildborne_title_adj% %wildborne_noun%"

  # Modern Names (hidden variants)
  wildborne_masc_modern:
    hidden: true
    pattern: "%wildborne_firstname_masc% %wildborne_lastname_modern%"
    capitalization: "(?<=^|\\s)."
    cleanup: "'+(?=\\s|$)"

  wildborne_femme_modern:
    hidden: true
    pattern: "%wildborne_firstname_femme% %wildborne_lastname_modern%"
    capitalization: "(?<=^|\\s)."
    cleanup: "'+(?=\\s|$)"

  # Traditional Names (Titles)
  wildborne_title_adj:
    hidden: true
    variants: ["The %wildborne_adj%"]

  wildborne_masc_traditional:
    hidden: true
    pattern: "%wildborne_firstname_masc% %wildborne_lastname_traditional%"
    capitalization: "(?<=^|\\s)."
    cleanup: "'+(?=\\s|$)"

  wildborne_femme_traditional:
    hidden: true
    pattern: "%wildborne_firstname_femme% %wildborne_lastname_traditional%"
    capitalization: "(?<=^|\\s)."
    cleanup: "'+(?=\\s|$)"

  wildborne_masc:
    variants:
      - "%wildborne_masc_modern%": 60
      - "%wildborne_masc_traditional%": 40
    capitalization: "(?<=^|\\s)."
    cleanup: "'+(?=\\s|$)"

  wildborne_femme:
    variants:
      - "%wildborne_femme_modern%": 60
      - "%wildborne_femme_traditional%": 40
    capitalization: "(?<=^|\\s)."
    cleanup: "'+(?=\\s|$)"

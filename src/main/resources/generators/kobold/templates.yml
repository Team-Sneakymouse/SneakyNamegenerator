templates:
  kobold_firstname_masc:
    hidden: true
    pattern: "%popular_names_masc_1920%"

  kobold_firstname_femme:
    hidden: true
    pattern: "%popular_names_femme_1920%"

  kobold_lastname:
    hidden: true
    pattern: "%kobold_family_names%"

  kobold_masc:
    pattern: "%kobold_firstname_masc% %kobold_lastname%"
    capitalization: "(?<=^|\\s).(?!he )"

  kobold_femme:
    pattern: "%kobold_firstname_femme% %kobold_lastname%"

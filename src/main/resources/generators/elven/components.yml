lists:
  # Strong Onsets (Noble/Impactful)
  elven_onset_strong:
    - "l": 15
    - "r": 12
    - "th": 10
    - "dh": 8
    - "gw": 7
    - "gal": 6
    - "cel": 6
    - "lor": 6
    - "ae": 5
    - "ny": 5
    - "h": 4
  
  # Weak Onsets (Soft/Liquid)
  elven_onset_weak:
    - "l": 20
    - "r": 15
    - "m": 12
    - "n": 12
    - "v": 8
    - "f": 8
    - "s": 10
    - "sh": 7
    - "": 5 # Some syllables have no onset
  
  # Strong Nuclei (Noble/Diphthongs)
  elven_nucleus_strong:
    - "ae": 15
    - "ai": 12
    - "eo": 10
    - "au": 8
    - "a": 15
    - "e": 12
    - "i": 10
    - "y": 8
  
  # Weak Nuclei (Short/Simple)
  elven_nucleus_weak:
    - "a": 20
    - "e": 15
    - "i": 15
    - "o": 10
    - "ie": 8
    - "ia": 5
  
  # Codas: soft or none
  elven_coda:
    - "": 50 # Often open syllables
    - "n": 10
    - "l": 8
    - "r": 7
    - "th": 5
    - "s": 4
    - "'": 3 # Hollywood apostrophe!


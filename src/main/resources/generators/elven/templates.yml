templates:
  # Base syllable generation
  elven_syllable_strong:
    hidden: true
    variants: ["%elven_onset_strong%%elven_nucleus_strong%%elven_coda%"]

  elven_syllable_weak:
    hidden: true
    variants: ["%elven_onset_weak%%elven_nucleus_weak%%elven_coda%"]

  # First names: Strong-Weak or Strong-Weak-Weak
  elven_firstname:
    hidden: true
    variants:
      - "%elven_syllable_strong%%elven_syllable_weak%": 88
      - "%elven_syllable_strong%%elven_syllable_weak%%elven_syllable_weak%": 12

  elven_lastname_modern:
    hidden: true
    variants:
      - "%elven_adj%%elven_noun%"

  # Modern elven name: Firstname + [Adj][Noun]
  elven_modern:
    hidden: true
    pattern: "%elven_firstname% %elven_lastname_modern%"
    capitalization: "(?<=^|\\s)."
    cleanup: "'+(?=\\s|$)"
    maxLength: 22

  # Traditional elven name: Firstname + Syllabic Lastname
  elven_traditional_lastname:
    hidden: true
    variants:
      - "%elven_syllable_strong%%elven_syllable_weak%": 85
      - "%elven_syllable_strong%%elven_syllable_weak%%elven_syllable_weak%": 15
  
  elven_traditional:
    hidden: true
    pattern: "%elven_firstname% %elven_traditional_lastname%"
    capitalization: "(?<=^|\\s)."
    cleanup: "'+(?=\\s|$)"
    maxLength: 22

  elf:
    variants:
      - "%elven_modern%": 45
      - "%elven_traditional%": 45
      - "%fae%": 10
    capitalization: "(?<=^|\\s)."
    cleanup: "'+(?=\\s|$)"
    maxLength: 22

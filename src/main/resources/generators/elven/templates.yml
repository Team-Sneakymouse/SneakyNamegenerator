templates:
  # Base syllable generation
  elven_syllable_strong:
    hidden: true
    variants: ["%elven_onset_strong%%elven_nucleus_strong%%elven_coda%"]

  elven_syllable_weak:
    hidden: true
    variants: ["%elven_onset_weak%%elven_nucleus_weak%%elven_coda%"]

  # First names: Strong-Weak or Strong-Weak-Weak
  elven_firstname:
    hidden: true
    variants:
      - "%elven_syllable_strong%%elven_syllable_weak%": 70
      - "%elven_syllable_strong%%elven_syllable_weak%%elven_syllable_weak%": 30

  # Modern elven name: Firstname + [Adj][Noun]
  elven_modern:
    pattern: "%elven_firstname% %elven_adj%%elven_noun%"
    capitalization: "(?<=^|\\s)."
    cleanup: "'+(?=\\s|$)"
    maxLength: 32

  # Traditional elven name: Firstname + Syllabic Lastname
  elven_traditional_lastname:
    hidden: true
    variants:
      - "%elven_syllable_strong%%elven_syllable_weak%"
      - "%elven_syllable_strong%%elven_syllable_weak%%elven_syllable_weak%"
  
  elven_traditional:
    pattern: "%elven_firstname% %elven_traditional_lastname%"
    capitalization: "(?<=^|\\s)."
    cleanup: "'+(?=\\s|$)"

templates:
  # Base syllable generation
  dwarven_syllable_strong:
    hidden: true
    variants: ["%dwarven_onset_strong%%dwarven_nucleus%%dwarven_coda%"]

  dwarven_syllable_weak:
    hidden: true
    variants: ["%dwarven_onset_weak%%dwarven_nucleus%%dwarven_coda%"]

  # First names: Masc
  dwarven_firstname_masc:
    hidden: true
    variants:
      - "%dwarven_syllable_strong%%dwarven_ending_masc%": 60
      - "%dwarven_syllable_strong%%dwarven_syllable_weak%%dwarven_ending_masc%": 40
    cleanup: "'+(?=\\s|$)|([^aeiou])\\1+"

  # First names: Femme
  dwarven_firstname_femme:
    hidden: true
    variants:
      - "%dwarven_syllable_strong%%dwarven_ending_femme%": 60
      - "%dwarven_syllable_strong%%dwarven_syllable_weak%%dwarven_ending_femme%": 40
    cleanup: "'+(?=\\s|$)|([^aeiou])\\1+"

  dwarven_lastname_modern_masc:
    hidden: true
    variants:
      - "%dwarven_adj%%dwarven_noun_masc%"

  dwarven_lastname_modern_femme:
    hidden: true
    variants:
      - "%dwarven_adj%%dwarven_noun_femme%"

  dwarven_lastname_traditional_masc:
    hidden: true
    variants:
      - "%dwarven_firstname_masc%son"

  dwarven_lastname_traditional_femme:
    hidden: true
    variants:
      - "%dwarven_firstname_masc%dottir"

  dwarven_lastname_town:
    hidden: true
    variants:
      - "of %dwarven_town%"

  # Hidden variants (used by dwarf_masc/dwarf_femme)
  dwarven_masc_modern:
    hidden: true
    pattern: "%dwarven_firstname_masc% %dwarven_lastname_modern_masc%"
    capitalization: "(?<=^|\\s)(?!of\\b)."
    cleanup: "'+(?=\\s|$)"

  dwarven_femme_modern:
    hidden: true
    pattern: "%dwarven_firstname_femme% %dwarven_lastname_modern_femme%"
    capitalization: "(?<=^|\\s)(?!of\\b)."
    cleanup: "'+(?=\\s|$)"

  dwarven_masc_traditional:
    hidden: true
    pattern: "%dwarven_firstname_masc% %dwarven_lastname_traditional_masc%"
    capitalization: "(?<=^|\\s)(?!of\\b)."
    cleanup: "'+(?=\\s|$)"

  dwarven_femme_traditional:
    hidden: true
    pattern: "%dwarven_firstname_femme% %dwarven_lastname_traditional_femme%"
    capitalization: "(?<=^|\\s)(?!of\\b)."
    cleanup: "'+(?=\\s|$)"

  dwarven_masc_town:
    hidden: true
    pattern: "%dwarven_firstname_masc% %dwarven_lastname_town%"
    capitalization: "(?<=^|\\s)(?!of\\b)."
    cleanup: "'+(?=\\s|$)"

  dwarven_femme_town:
    hidden: true
    pattern: "%dwarven_firstname_femme% %dwarven_lastname_town%"
    capitalization: "(?<=^|\\s)(?!of\\b)."
    cleanup: "'+(?=\\s|$)"

  dwarf_masc_core:
    hidden: true
    variants:
      - "%dwarven_masc_modern%": 55
      - "%dwarven_masc_traditional%": 30
      - "%dwarven_masc_town%": 15
    capitalization: "(?<=^|\\s)(?!of\\b)."
    cleanup: "'+(?=\\s|$)"

  dwarf_femme_core:
    hidden: true
    variants:
      - "%dwarven_femme_modern%": 55
      - "%dwarven_femme_traditional%": 30
      - "%dwarven_femme_town%": 15
    capitalization: "(?<=^|\\s)(?!of\\b)."
    cleanup: "'+(?=\\s|$)"

  dwarf_masc:
    variants:
      - "%dwarf_masc_core%": 70
      - "%viking_masc%": 15
      - "%halfling%": 15
    capitalization: "(?<=^|\\s)(?!of\\b)."
    cleanup: "'+(?=\\s|$)"

  dwarf_femme:
    variants:
      - "%dwarf_femme_core%": 70
      - "%viking_femme%": 15
      - "%halfling%": 15
    capitalization: "(?<=^|\\s)(?!of\\b)."
    cleanup: "'+(?=\\s|$)"

templates:
  # Base Syllables
  beastkin_syllable_masc:
    hidden: true
    variants: ["%beastkin_onset_masc%%beastkin_nucleus_masc%%beastkin_coda_masc%"]

  beastkin_syllable_femme:
    hidden: true
    variants: ["%beastkin_onset_femme%%beastkin_nucleus_femme%%beastkin_coda_femme%"]

  # First Names
  beastkin_firstname_masc:
    hidden: true
    variants:
      - "%beastkin_syllable_masc%": 60
      - "%beastkin_syllable_masc%%beastkin_syllable_masc%": 40
    cleanup: "(.)\\1+|(sh|zh|z|s){2,}" # Collapse doubles and sibilant clusters

  # First Names: Femme
  beastkin_firstname_femme:
    hidden: true
    variants:
      - "%beastkin_syllable_femme%": 60
      - "%beastkin_syllable_femme%%beastkin_syllable_femme%": 40
    cleanup: "(.)\\1+|(sh|zh|z|s){2,}"

  # Modern Names
  beastkin_masc_modern:
    pattern: "%beastkin_firstname_masc% %beastkin_adj%%beastkin_noun%"
    capitalization: "(?<=^|\\s)."
    cleanup: "'+(?=\\s|$)"

  beastkin_femme_modern:
    pattern: "%beastkin_firstname_femme% %beastkin_adj%%beastkin_noun%"
    capitalization: "(?<=^|\\s)."
    cleanup: "'+(?=\\s|$)"

  # Traditional Names (Titles)
  beastkin_title_adj:
    hidden: true
    variants: ["The %beastkin_adj%"]

  beastkin_masc_traditional:
    pattern: "%beastkin_firstname_masc% %beastkin_title_adj% %beastkin_noun%"
    capitalization: "(?<=^|\\s)."
    cleanup: "'+(?=\\s|$)"

  beastkin_femme_traditional:
    pattern: "%beastkin_firstname_femme% %beastkin_title_adj% %beastkin_noun%"
    capitalization: "(?<=^|\\s)."
    cleanup: "'+(?=\\s|$)"

  # Aliases
  beastkin_modern:
    variants:
      - "%beastkin_masc_modern%": 50
      - "%beastkin_femme_modern%": 50

  beastkin_traditional:
    variants:
      - "%beastkin_masc_traditional%": 50
      - "%beastkin_femme_traditional%": 50
